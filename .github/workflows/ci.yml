name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Mirrors the Dockerfile: libmagic for file typing, binutils for
          # native-binary inspection.
          sudo apt-get install -y --no-install-recommends libmagic1 binutils
          # Rizin — the engine Cutter is built on — powers the deep-disassembly
          # `cutter` analyzer. Optional and installed tolerantly: the test suite
          # degrades gracefully when it is absent, so CI stays green either way.
          sudo apt-get install -y --no-install-recommends rizin \
            || echo "rizin unavailable on this runner; continuing without it"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -q
